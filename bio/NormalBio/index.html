<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Biology</title>
    <link rel="shortcut icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/sakurakouji-luna/pic@main/web/avatar/web_ico_runa.ico">
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        color: #293022;
        background:
          linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.86)),
          url("https://cdn.jsdelivr.net/gh/sakurakouji-luna/pic@main/blog/blog_wallpaper_1.png") center / cover fixed;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(100%, 520px);
        padding: clamp(22px, 7vw, 42px);
        border: 1px solid rgba(41, 48, 34, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.16);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 9vw, 48px);
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 0;
        color: #5e6758;
        font-size: 16px;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        margin-top: 22px;
        padding: 0 16px;
        border-radius: 6px;
        color: #ffffff;
        background: #4f6f44;
        text-decoration: none;
      }

      @media (max-width: 520px) {
        body {
          padding: 14px;
          background-attachment: scroll;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Normal Biology</h1>
      <p>Under construction.</p>
      <a href="../index.html">Back to Bio</a>
    </main>
  </body>
</html>
