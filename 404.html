<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://moe.st/404.html">
    <style>
      :root {
        --cyan: #9dfcff;
        --pink: #ff4df0;
        --ink: #05070a;
        --text: #f0fbff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        color: var(--text);
        background: var(--ink);
        font-family: "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
      }

      .page {
        position: relative;
        display: grid;
        min-height: 100vh;
        padding: clamp(18px, 4vw, 56px);
        background:
          linear-gradient(90deg, rgba(4, 7, 11, 0.72), rgba(4, 7, 11, 0.2) 42%, rgba(4, 7, 11, 0.45)),
          linear-gradient(180deg, rgba(2, 4, 7, 0.42), rgba(2, 4, 7, 0.1) 45%, rgba(2, 4, 7, 0.62)),
          url("https://cdn.jsdelivr.net/gh/sakurakouji-luna/pic@main/blog/404.png") center / cover no-repeat;
        isolation: isolate;
      }

      .page::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          repeating-linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.045) 0,
            rgba(255, 255, 255, 0.045) 1px,
            transparent 1px,
            transparent 5px
          );
        mix-blend-mode: overlay;
        opacity: 0.28;
        pointer-events: none;
      }

      .page::after {
        content: "";
        position: absolute;
        inset: -24px;
        z-index: -1;
        border: 1px solid rgba(157, 252, 255, 0.16);
        box-shadow:
          inset 0 0 80px rgba(0, 0, 0, 0.76),
          inset 0 0 140px rgba(157, 252, 255, 0.1);
        pointer-events: none;
      }

      .content {
        align-self: end;
        max-width: 560px;
        padding-bottom: clamp(22px, 8vh, 96px);
      }

      .label {
        margin: 0 0 12px;
        color: var(--cyan);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-shadow:
          2px 0 var(--pink),
          0 0 18px rgba(157, 252, 255, 0.62);
      }

      h1 {
        margin: 0;
        font-size: clamp(40px, 8vw, 112px);
        line-height: 0.92;
        font-weight: 800;
        letter-spacing: 0;
        color: #ffffff;
        text-shadow:
          3px 0 var(--pink),
          -3px 0 var(--cyan),
          0 0 24px rgba(157, 252, 255, 0.52);
      }

      .message {
        max-width: 460px;
        margin: 18px 0 0;
        color: rgba(240, 251, 255, 0.82);
        font-size: clamp(15px, 1.8vw, 18px);
        line-height: 1.65;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }

      .action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 16px;
        border: 1px solid rgba(157, 252, 255, 0.72);
        border-radius: 4px;
        color: #f6ffff;
        background: rgba(4, 9, 13, 0.52);
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        box-shadow:
          2px 2px 0 rgba(255, 77, 240, 0.48),
          0 0 18px rgba(157, 252, 255, 0.18);
        backdrop-filter: blur(4px);
      }

      .action:hover,
      .action:focus-visible {
        outline: none;
        color: var(--ink);
        background: var(--cyan);
        box-shadow:
          3px 3px 0 rgba(255, 77, 240, 0.76),
          0 0 24px rgba(157, 252, 255, 0.56);
      }

      @media (max-width: 720px) {
        .page {
          background-position: center top;
        }

        .content {
          max-width: 100%;
          padding-bottom: 18px;
        }

        .message {
          max-width: 24rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="content" aria-labelledby="title">
        <p class="label">Route missing</p>
        <h1 id="title">404</h1>
        <p class="message">The signal ends here. The page you opened is offline, moved, or never made it onto this branch.</p>
        <nav class="actions" aria-label="Recovery links">
          <a class="action" href="/">Return home</a>
          <a class="action" href="javascript:history.back()">Go back</a>
        </nav>
      </section>
    </main>
  </body>
</html>
